  .device-img.fallback { font-size: 70px; line-height: 140px; }
  .device-name { font-weight: 700; font-size: 16px; }

  .price-line { display: flex; justify-content: space-between; padding: 6px 0; font-size: 15px; }
  .price-line.total { font-weight: 700; font-size: 19px; color: #0071e3; border-top: 1px solid #f0f0f0; margin-top: 8px; padding-top: 12px; }
  .price-line .credit { color: #1a8a3a; }
  .choice-row { display: flex; gap: 14px; margin-top: 16px; flex-wrap: wrap; }
  .choice { flex: 1; min-width: 200px; border: 2px solid #e5e5ea; border-radius: 14px; padding: 16px; text-align: center; }
  .choice.best { border-color: #1a8a3a; background: #f1faf3; }
  .choice h4 { font-size: 14px; color: #6e6e73; margin-bottom: 6px; }
  .choice .amt { font-size: 22px; font-weight: 700; }
  .choice .tag { display: inline-block; margin-top: 8px; font-size: 12px; font-weight: 700; color: #1a8a3a; }
  .repair-note { background: #fff8e6; border: 1px solid #ffe2a8; border-radius: 12px; padding: 14px; margin-top: 16px; font-size: 13px; color: #6e4e00; line-height: 1.5; }
  .benefits h3 { margin-bottom: 16px; font-size: 18px; }
  .benefit { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-top: 1px solid #f0f0f0; }
  .benefit-num { background: #0071e3; color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
  .warning { text-align: center; color: #d70015; margin-top: 16px; }
  .disclaimer { text-align: center; font-size: 12px; color: #86868b; margin-top: 30px; }

</head>

<div class="container">

  <div class="selectors">

      <label for="storage" id="storageLabel" class="hidden" style="margin-top:8px;">Storage</label>
      <select id="storage" class="hidden"><option value="">Select model first</option></select>
      <label for="condition" style="margin-top:8px;">Condition / option</label>
      <select id="condition">
        <option value="tradein">Trade In (working)</option>
        <option value="damaged">Damaged</option>
      </select>
      <label for="damageType" id="damageLabel" class="hidden" style="margin-top:8px;">Type of damage</label>
      <select id="damageType" class="hidden">
        <option value="screen">Screen damage</option>
        <option value="back">Back glass damage</option>
        <option value="battery">Battery service</option>
        <option value="other">Other damage</option>
      </select>
    </div>
    <div class="selector-group">
      <label for="newPhone">Upgrade to</label>
      <select id="newPhone"><option value="">Select...</option></select>
    </div>
  </div>

  <div class="result" id="result">
    <div class="compare-row" id="compareRow"></div>
    <div class="price-box" id="priceBox"></div>
    <div class="benefits">
      <h3>Top 3 reasons to upgrade</h3>
      <div id="benefitsList"></div>
    </div>
  </div>

  <p class="disclaimer">Prices, trade-in values, repair costs and financing terms are UK estimates only — always confirm on apple.com/uk and support.apple.com/en-gb/iphone/repair. Battery figures are hours of video playback.</p>
</div>

function fmtStorage(gb){ return gb >= 1024 ? (gb/1024)+"TB" : gb+"GB"; }

function tradeInValue(key, storage){
  const base = tradeIn[key] || 0;
  if (base === 0) return 0;
  const smallest = Math.min(...phones[key].storages);
  const adj = (STORAGE_TRADEIN_SCALE[storage]||0) - (STORAGE_TRADEIN_SCALE[smallest]||0);
  return base + adj;
}

function getBenefits(oldP, newP) {
  const b = [];
  if (oldP.chip !== newP.chip)
    b.push(`Faster <strong>${newP.chip}</strong> chip (up from ${oldP.chip}) for smoother performance and gaming.`);
  if (oldP.camera !== newP.camera)
    b.push(`Upgraded camera: <strong>${newP.camera}</strong> vs your ${oldP.camera} for sharper photos.`);
  if (newP.battery > oldP.battery)
    b.push(`<strong>${newP.battery - oldP.battery} more hours</strong> of video playback — ${newP.name}: ${newP.battery}h vs ${oldP.name}: ${oldP.battery}h.`);
  if (oldP.display !== newP.display)
    b.push(`Better <strong>${newP.display}</strong> display vs your ${oldP.display}.`);
  newP.features.forEach(f => { if (!oldP.features.includes(f)) b.push(`New feature: <strong>${f}</strong>.`); });
  return b.slice(0, 3);
}

function buildOptions(sel, newestFirst, filterArr) {
  let groupNames = Object.keys(groups);
  if (newestFirst) groupNames = groupNames.reverse();
  groupNames.forEach(g => {
    let items = groups[g];
    if (filterArr) items = items.filter(k => filterArr.includes(k));
    if (!items.length) return;
    const og = document.createElement('optgroup'); og.label = g;
    if (newestFirst) items = [...items].reverse();
    items.forEach(key => { const o = document.createElement('option'); o.value = key; o.textContent = phones[key].name; og.appendChild(o); });
    sel.appendChild(og);
  });
}

  phones[key].storages.forEach(gb => {
    const o = document.createElement('option'); o.value = gb; o.textContent = fmtStorage(gb);
    storageSel.appendChild(o);
  });
}

}

function update() {
  const oldKey = oldSel.value, newKey = newSel.value, cond = condSel.value;
  const storage = parseInt(storageSel.value) || (oldKey ? Math.min(...phones[oldKey].storages) : 0);
  const result = document.getElementById('result');

  const showDmg = cond === "damaged";
  dmgSel.classList.toggle('hidden', !showDmg);
  dmgLabel.classList.toggle('hidden', !showDmg);

  if (!oldKey || !newKey) { result.style.display = 'none'; return; }

  const oldP = phones[oldKey], newP = phones[newKey];
  const months = financeMonths(newKey);
  const row = document.getElementById('compareRow');
  const box = document.getElementById('priceBox');
  const list = document.getElementById('benefitsList');

  if (oldKey === newKey) {
    row.innerHTML = ""; box.innerHTML = `<div class="price-line total">Please pick two different models.</div>`;
    list.innerHTML = ""; result.style.display = 'block'; return;
  }

  row.innerHTML = deviceCard(oldKey, storage) + `<div class="vs">→</div>` + deviceCard(newKey);

  let html = "";
  if (cond === "tradein") {
    const credit = tradeInValue(oldKey, storage);
    const net = newP.price - credit;
    html += `<div class="price-line"><span>${newP.name} (RRP)</span><span>£${newP.price}</span></div>`;
    html += `<div class="price-line"><span>Trade-in credit for ${oldP.name} (${fmtStorage(storage)})</span><span class="credit">− £${credit}</span></div>`;
    html += `<div class="price-line total"><span>Estimated cost to upgrade</span><span>£${net}</span></div>`;

    // --- Affordability: trade-in as months of payments ---
    const monthly = newP.price / months;
    const monthsCovered = credit > 0 ? credit / monthly : 0;
    html += `<div class="repair-note" style="background:#eef6ff;border:1px solid #cfe4ff;color:#0b4a8f;">
      📅 <strong>Affordability:</strong> At Apple's 0% rate of about <strong>£${monthly.toFixed(2)}/month</strong>
      over ${months} months, your <strong>£${credit}</strong> trade-in covers roughly
      <strong>${monthsCovered.toFixed(1)} months</strong> of payments
      ${credit > 0 ? `— so you'd effectively only pay for about ${(months - monthsCovered).toFixed(1)} months.` : ''}
    </div>`;
  } else { // damaged
    const r = repair[oldKey] || {screen:0, back:0, battery:0, other:0};
    const type = dmgSel.value;
    const repairCost = r[type];
    const upgradeCost = newP.price;
    const repairCheaper = repairCost < upgradeCost;
    const typeLabel = dmgLabels[type];
    html += `<div class="price-line"><span>${newP.name} (RRP)</span><span>£${newP.price}</span></div>`;
    html += `<div class="price-line"><span>Trade-in credit (damaged = recycle only)</span><span class="credit">− £0</span></div>`;
    html += `<div class="choice-row">
      <div class="choice ${repairCheaper?'best':''}">
        <h4>🔧 Keep & repair your ${oldP.name}</h4>
        <div class="amt">£${repairCost}</div>
        <div style="font-size:12px;color:#6e6e73;margin-top:4px;">${typeLabel} repair</div>
        ${repairCheaper?'<div class="tag">✓ Cheaper option</div>':''}
      </div>
      <div class="choice ${!repairCheaper?'best':''}">
        <h4>✨ Upgrade to ${newP.name}</h4>
        <div class="amt">£${upgradeCost}</div>
        ${!repairCheaper?'<div class="tag">✓ Cheaper option</div>':''}
      </div>
    </div>`;
    const diff = Math.abs(upgradeCost - repairCost);
    // --- Affordability framing for the damaged path ---
    const monthly = newP.price / months;
    const repairMonths = monthly > 0 ? repairCost / monthly : 0;
    html += `<div class="repair-note">🔧 ${typeLabel.charAt(0).toUpperCase()+typeLabel.slice(1)} service on your ${oldP.name} costs about <strong>£${repairCost}</strong>.
      Upgrading is about <strong>£${diff} ${repairCheaper?'more':'less'}</strong>.
      <br>📅 At Apple's 0% rate of about <strong>£${monthly.toFixed(2)}/month</strong> over ${months} months,
      that <strong>£${repairCost}</strong> repair is the same as roughly <strong>${repairMonths.toFixed(1)} months</strong> of payments towards the ${newP.name}.
      <br>Damaged devices usually only qualify for free recycling, not trade-in credit. Confirm exact prices on Apple's repair page.</div>`;
  }
  box.innerHTML = html;

  const benefits = getBenefits(oldP, newP);
  list.innerHTML = benefits.length
    ? benefits.map((t,i)=>`<div class="benefit"><div class="benefit-num">${i+1}</div><div>${t}</div></div>`).join('')
    : `<div class="warning">No major upgrades detected for this combination.</div>`;

  result.style.display = 'block';
}

oldSel.addEventListener('change', () => { populateStorage(); update(); });
[newSel,storageSel,condSel,dmgSel].forEach(s => s.addEventListener('change', update));
populateStorage();
</script>
</body>
</html>
